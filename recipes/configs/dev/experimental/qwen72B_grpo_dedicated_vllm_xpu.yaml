# GRPO with dedicated vLLM node on Intel XPU (Aurora HPC) — Qwen2.5-72B-Instruct
#
# Architecture: 3+ PBS nodes (true FSDP, cross-node sharding)
#   Node 0 (vLLM only):  TP×DP replicas across all 12 tiles
#     - TP=4, DP=3: 3 replicas on tiles {0-3}, {4-7}, {8-11}
#     - TP=8, DP=1: 1 replica on tiles {0-7} (4 tiles unused, more KV cache)
#   Nodes 1-N (training only): 12 tiles/node, true FSDP across all training tiles
#
# Memory budget per training tile (24-way FSDP, 2 training nodes):
#   Policy FSDP shard (72B / 24 ranks): ~6 GiB
#   Ref FSDP shard: ~6 GiB
#   Optimizer states (2× policy shard, FP32): ~12 GiB
#   Activations + KV cache (with checkpointing): ~8-12 GiB
#   Total estimated: ~32-36 GiB — fits within 48 GiB tiles
#
# Launch:
#   VLLM_TP=4 VLLM_DP=3 bash recipes/dev/aurora_grpo_72b_dedicated_vllm.sh

name: grpo_dedicated_vllm_qwen2_5_72b_xpu

output_dir: /tmp/torchtune/grpo_dedicated_vllm_72b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen2.5-72B-Instruct

# vLLM server mode — URL(s) overridden by launch script
vllm_url: "http://localhost:8001"
vllm_group_port: 51216
vllm_weight_sync: false

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen2_5.qwen2_5_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 512

# Dataset
dataset:
  _component_: torchtune.dev.rl.gsm8k.gsm8k_dataset
  partition: 1-9/10
seed: 42
shuffle: False

# Model
model:
  _component_: torchtune.models.qwen2_5.qwen2_5_72b_instruct

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files:
    filename_format: model-{}-of-{}.safetensors
    max_filename: "00037"
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN2

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files:
    filename_format: model-{}-of-{}.safetensors
    max_filename: "00037"
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN2

resume_from_checkpoint: False
save_every_n_epochs: 1

# GRPO parameters — very conservative for 72B memory
batch_size: 1
grpo_samples: 4
forward_batch_size: 1
max_generated_tokens: 128
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

num_steps: 3

clip_grad_norm: 1.0

epochs: 1
optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 2
loss:
  _component_: torchtune.dev.rl.loss.GRPOSimpleLoss
  kl_coeff: 0.01
  epsilon: 0.2

# XPU device
device: xpu

# Memory management
enable_activation_checkpointing: True
fsdp_cpu_offload: True
compile: False

# Precision
dtype: bf16

reward_functions:
    - _component_: torchtune.dev.rl.rewards.FormattedMathCorrectnessReward
      answer_tag: answer
      positive_reward: 10.0
      negative_reward: 0.0
    - _component_: torchtune.dev.rl.rewards.ThinkingAnswerFormattingReward
      think_tag: think
      answer_tag: answer
      positive_reward: 1.0
      negative_reward: 0.0

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
