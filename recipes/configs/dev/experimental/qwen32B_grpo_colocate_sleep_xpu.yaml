# GRPO with colocated vLLM + sleep/wake on Intel XPU — Qwen3-32B
# 12 tiles: 3 DP groups × TP=4 for generation, FSDP-12 for training.
# Sleep/wake time-multiplexes vLLM and training on the same tiles.
#
# Memory budget per tile (64 GiB):
#   Generation (vLLM awake): 32B/4 = 16 GiB model + ~5 GiB KV cache = ~21 GiB
#   Training (vLLM sleeping): FSDP-12 shard 5.3 + ref 5.3 + optim 10.6 + act ~15 = ~36 GiB
#   Both fit since they don't overlap (sleep/wake alternation)
#
# Baseline: server mode TP=2 + FSDP-10 = 25.6 s/step
#
# Launch:
#   bash recipes/dev/run_grpo_colocate_xpu.sh 12 \
#     /lus/flare/projects/ModCon/ngetty/models/Qwen3-32B 3 \
#     recipes/configs/dev/qwen32B_grpo_colocate_sleep_xpu.yaml

name: grpo_colocate_sleep_qwen3_32b_xpu

output_dir: /tmp/torchtune/grpo_colocate_sleep_32b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen3-32B

# Colocated vLLM with sleep/wake and TP=4
vllm_mode: "colocate_sleep"
vllm_tensor_parallel_size: 4
vllm_gpu_memory_utilization: 0.35
vllm_max_model_len: 512

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen3.qwen3_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 512

# Dataset
dataset:
  _component_: torchtune.dev.grpo.gsm8k.gsm8k_dataset
  partition: 1-9/10
seed: 42
shuffle: False

# Model
model:
  _component_: torchtune.models.qwen3.qwen3_32b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00017.safetensors,
    model-00002-of-00017.safetensors,
    model-00003-of-00017.safetensors,
    model-00004-of-00017.safetensors,
    model-00005-of-00017.safetensors,
    model-00006-of-00017.safetensors,
    model-00007-of-00017.safetensors,
    model-00008-of-00017.safetensors,
    model-00009-of-00017.safetensors,
    model-00010-of-00017.safetensors,
    model-00011-of-00017.safetensors,
    model-00012-of-00017.safetensors,
    model-00013-of-00017.safetensors,
    model-00014-of-00017.safetensors,
    model-00015-of-00017.safetensors,
    model-00016-of-00017.safetensors,
    model-00017-of-00017.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN3

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00017.safetensors,
    model-00002-of-00017.safetensors,
    model-00003-of-00017.safetensors,
    model-00004-of-00017.safetensors,
    model-00005-of-00017.safetensors,
    model-00006-of-00017.safetensors,
    model-00007-of-00017.safetensors,
    model-00008-of-00017.safetensors,
    model-00009-of-00017.safetensors,
    model-00010-of-00017.safetensors,
    model-00011-of-00017.safetensors,
    model-00012-of-00017.safetensors,
    model-00013-of-00017.safetensors,
    model-00014-of-00017.safetensors,
    model-00015-of-00017.safetensors,
    model-00016-of-00017.safetensors,
    model-00017-of-00017.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN3

resume_from_checkpoint: False
save_every_n_epochs: 1

# GRPO parameters — conservative for 32B
batch_size: 1
grpo_samples: 4
forward_batch_size: 4
max_generated_tokens: 128
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

num_steps: 3

clip_grad_norm: 1.0

epochs: 1
optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 2
loss:
  _component_: torchtune.dev.grpo.loss.GRPOSimpleLoss
  kl_coeff: 0.01
  epsilon: 0.2

# XPU device
device: xpu

# Memory management
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

reward_functions:
    - _component_: torchtune.dev.rl.rewards.FormattedMathCorrectnessReward
      answer_tag: answer
      positive_reward: 10.0
      negative_reward: 0.0
    - _component_: torchtune.dev.rl.rewards.ThinkingAnswerFormattingReward
      think_tag: think
      answer_tag: answer
      positive_reward: 1.0
      negative_reward: 0.0

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
