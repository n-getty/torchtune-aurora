# GRPO with replicated vLLM + HSDP on Aurora XPU (2+ nodes) — Qwen3-32B
#
# Each node runs: vLLM (tiles 10-11, TP=2) + 10 training ranks (tiles 0-9)
# HSDP: FSDP within node (dp_shard=10), DDP across nodes (dp_replicate=2)
# Each shard leader talks to its local vLLM at localhost.
#
# Memory budget per training tile (64 GiB):
#   FSDP shard (32B / 20 ranks): ~3.2 GiB (half of single-node)
#   Ref FSDP shard: ~3.2 GiB
#   Optimizer states (2× shard): ~6.4 GiB
#   Activations + KV cache: ~10-15 GiB
#   Total estimated: ~23-28 GiB — well within 64 GiB
#
# Single-node baseline: 25.6 s/step (10 tiles + TP=2 vLLM)
#
# Launch:
#   bash recipes/dev/aurora_grpo_vllm_hsdp_multinode.sh
#   (set MODEL_SRC, CONFIG overrides as needed)

name: grpo_vllm_hsdp_qwen3_32b_xpu

output_dir: /tmp/torchtune/grpo_vllm_hsdp_32b

base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen3-32B

# HSDP: set by launcher (data_parallel_replicate_dim=NUM_NODES)
data_parallel_replicate_dim: 2

# vLLM generation server (each node has its own at localhost)
vllm_url: "http://localhost:8001"
vllm_group_port: 51216
vllm_weight_sync: false

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen3.qwen3_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 512

# Dataset
dataset:
  _component_: torchtune.dev.grpo.gsm8k.gsm8k_dataset
  partition: 1-9/10
seed: 42
shuffle: False

# Model
model:
  _component_: torchtune.models.qwen3.qwen3_32b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00017.safetensors,
    model-00002-of-00017.safetensors,
    model-00003-of-00017.safetensors,
    model-00004-of-00017.safetensors,
    model-00005-of-00017.safetensors,
    model-00006-of-00017.safetensors,
    model-00007-of-00017.safetensors,
    model-00008-of-00017.safetensors,
    model-00009-of-00017.safetensors,
    model-00010-of-00017.safetensors,
    model-00011-of-00017.safetensors,
    model-00012-of-00017.safetensors,
    model-00013-of-00017.safetensors,
    model-00014-of-00017.safetensors,
    model-00015-of-00017.safetensors,
    model-00016-of-00017.safetensors,
    model-00017-of-00017.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN3

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00017.safetensors,
    model-00002-of-00017.safetensors,
    model-00003-of-00017.safetensors,
    model-00004-of-00017.safetensors,
    model-00005-of-00017.safetensors,
    model-00006-of-00017.safetensors,
    model-00007-of-00017.safetensors,
    model-00008-of-00017.safetensors,
    model-00009-of-00017.safetensors,
    model-00010-of-00017.safetensors,
    model-00011-of-00017.safetensors,
    model-00012-of-00017.safetensors,
    model-00013-of-00017.safetensors,
    model-00014-of-00017.safetensors,
    model-00015-of-00017.safetensors,
    model-00016-of-00017.safetensors,
    model-00017-of-00017.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN3

resume_from_checkpoint: False
save_every_n_epochs: 1

# GRPO parameters — conservative for 32B
batch_size: 1
grpo_samples: 4
forward_batch_size: 1
max_generated_tokens: 128
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

num_steps: 5

clip_grad_norm: 1.0

epochs: 1
optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 2
loss:
  _component_: torchtune.dev.grpo.loss.GRPOSimpleLoss
  kl_coeff: 0.01
  epsilon: 0.2

# XPU device
device: xpu

# Memory management
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

reward_functions:
    - _component_: torchtune.dev.rl.rewards.FormattedMathCorrectnessReward
      answer_tag: answer
      positive_reward: 10.0
      negative_reward: 0.0
    - _component_: torchtune.dev.rl.rewards.ThinkingAnswerFormattingReward
      think_tag: think
      answer_tag: answer
      positive_reward: 1.0
      negative_reward: 0.0

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
