# GRPO gene recall training — Gemma 4 31B, single node, vLLM server mode
#
# Trains on 95 cancer biology narrative→gene-list samples.
# Reward: F1 score between predicted and reference HGNC gene sets.
#
# Tile layout: 10 training tiles (FSDP) + 2 vLLM tiles (TP=2).
# The no-vLLM path is incompatible with FSDP2 on XPU for 31B: local_kv_cache
# teardown frees 64 KV cache tensors (one per layer) via kv_cache=None, which
# triggers zeMemFree on sub-allocated USM blocks while FSDP storage is live —
# exhausting L0 UR handles (UR_RESULT_ERROR_OUT_OF_RESOURCES). vLLM server
# mode avoids this entirely: generation tiles are separate from training tiles.
#
# Launch:
#   bash recipes/dev/run_grpo_vllm_xpu.sh 2 10 \
#     /lus/flare/projects/ModCon/ngetty/models/gemma-4-31B 200 \
#     recipes/configs/dev/production/gemma4_31B_gene_recall_xpu.yaml

name: grpo_gene_recall_gemma4_31b_xpu

output_dir: /lus/flare/projects/ModCon/ngetty/torchtune/outputs/gene_recall_31b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/gemma-4-31B
data_dir: /lus/flare/projects/ModCon/ngetty/hackathon_rl/prepared_data

# vLLM server (2 tiles TP=2 on tiles 10-11, managed by run_grpo_vllm_xpu.sh)
vllm_url: "http://localhost:8001"
vllm_group_port: 51216
vllm_weight_sync: true
# SHM sync: gather(~5.5s blocking) + copy+HTTP hidden behind generation.
# raw_bytes was ~74s for 62 GiB — SHM expected ~8-10s (gather dominates).
vllm_weight_sync_interval: 1
vllm_weight_sync_method: shm

# Tokenizer
tokenizer:
  _component_: torchtune.models.gemma4.gemma4_tokenizer
  tokenizer_json_path: ${base_model_path}/tokenizer.json
  tokenizer_config_json_path: ${base_model_path}/tokenizer_config.json
  max_seq_len: 1024

# Dataset — gene recall JSONL
dataset:
  _component_: torchtune.dev.rl.gene_recall.gene_recall_dataset
  data_files: ${data_dir}/gene_recall_train.jsonl
  max_seq_len: 1024
seed: 42
shuffle: True

# Model
model:
  _component_: torchtune.models.gemma4.gemma4_31b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: GEMMA4

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: GEMMA4

resume_from_checkpoint: False
save_every_n_epochs: 1
save_every_n_steps: 20

# Reward
reward_mode: gene_recall
gene_reward_metric: f1   # options: f1, recall, jaccard

# GRPO parameters — matches working gemma4_31B_grpo_server_xpu.yaml baseline
batch_size: 1
grpo_samples: 4
forward_batch_size: 4
max_generated_tokens: 512   # reasoning + gene list; <genes>...</genes> parsed by reward
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

# Run for a few epochs over the small dataset
epochs: 3
num_steps: 200

clip_grad_norm: 1.0

optimizer:
  _component_: torch.optim.AdamW
  lr: 1e-6  # reduced from 5e-6 — Gemma4 31B diverged at 5e-6 (grad_norm exploded step 3)
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 5
loss:
  _component_: torchtune.dev.rl.loss.GRPOSimpleLoss
  kl_coeff: 0.01  # reduced from 0.1 — also added exp() clamp(max=20) in loss.py for overflow protection

  epsilon: 0.2

# XPU device
device: xpu

# Memory management
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
