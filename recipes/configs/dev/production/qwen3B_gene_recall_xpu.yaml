# GRPO gene recall training — Qwen2.5 3B, single node, no vLLM
#
# Fallback from Gemma4 31B when UR:40 / memory pressure prevents training.
# 3B model fits easily on a single tile; 10 tiles gives comfortable headroom.
#
# Launch:
#   bash recipes/dev/run_grpo_xpu.sh 10 5
#   or directly:
#   python3 -m torch.distributed.run --standalone --nproc_per_node=10 \
#       recipes/dev/grpo_full_finetune_distributed_xpu.py \
#       --config recipes/configs/dev/production/qwen3B_gene_recall_xpu.yaml

name: grpo_gene_recall_qwen3b_xpu

output_dir: /lus/flare/projects/ModCon/ngetty/torchtune/outputs/gene_recall_qwen3b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen2.5-3B
data_dir: /lus/flare/projects/ModCon/ngetty/hackathon_rl/prepared_data

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen2_5.qwen2_5_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 512

# Dataset — gene recall JSONL
dataset:
  _component_: torchtune.dev.grpo.gene_recall.gene_recall_dataset
  data_files: ${data_dir}/gene_recall_train.jsonl
  max_seq_len: 512
seed: 42
shuffle: True

# Model
model:
  _component_: torchtune.models.qwen2_5.qwen2_5_3b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN2

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN2

resume_from_checkpoint: False
save_every_n_epochs: 1
save_every_n_steps: 20  # Mid-run checkpoints every 20 steps (avoids losing all work if job is killed)

# Weight sync method: shm=POSIX shared memory (2.8s, validated 2026-04-16), raw_bytes=9.3s fallback
vllm_weight_sync_method: shm

# Reward
reward_mode: gene_recall
gene_reward_metric: f1

# GRPO parameters — v2 config based on 100-step run analysis.
# kl_coeff=0.01 caused exponential KL spikes (peaked at 70); 0.1 suppresses runaway divergence.
# grpo_samples=4→8: more rollouts per prompt → better group baseline → lower advantage variance.
# batch_size=2: keep to focus budget on rollout quality over theme diversity.
# forward_batch_size=4: processes 16 total sequences (batch=2 × grpo_samples=8) in 4 chunks of 4.
# TORCHTUNE_USE_CHUNKED_LOSS=1 required for chunked forward; grads accumulated before single BWD.
# Peak memory with fbs=16: allocator grows to 62 GiB by step 7 → L0 evicts IPC handles → crash.
# Peak memory with fbs=4: ~20-25 GiB stable (estimated). See experiments/gene_recall/run_3b_*.out.
batch_size: 2
grpo_samples: 8
forward_batch_size: 4
max_generated_tokens: 512
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

epochs: 5
num_steps: 500

clip_grad_norm: 1.0

optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 10
loss:
  _component_: torchtune.dev.grpo.loss.GRPOSimpleLoss
  kl_coeff: 0.3  # increased from 0.1 — periodic spikes grew to 2.6 by step 43 with 0.1; need stronger damping
  epsilon: 0.2

# XPU device
device: xpu

# Memory management — AC reduces peak backward memory, needed to avoid UR:40
# handle exhaustion from FSDP2 AllGather buffers accumulating over steps.
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
