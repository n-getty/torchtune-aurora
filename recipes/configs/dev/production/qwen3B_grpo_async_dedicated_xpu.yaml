# Phase 2 Step 1 prototype — Qwen2.5 3B, dedicated-rank vLLM via gloo gen_pg.
#
# Mirrors qwen3B_grpo_async_xpu.yaml (server mode) with one structural change:
# vllm_mode: dedicated_rank, vllm_dedicated_rank: 11. Generation now flows over
# the 2-rank gloo `_gen_pg`; the vLLM rank no longer participates in world-PG
# collectives, so training ranks 1..N-2 can run fwd/bwd while the producer
# thread on rank 0 talks to the vLLM rank.
#
# Layout: 11 training tiles (FSDP) + 1 vLLM tile (rank 11) on a single node.

name: grpo_async_dedicated_qwen3b_xpu

output_dir: /lus/flare/projects/ModCon/ngetty/torchtune/outputs/grpo_async_dedicated_qwen3b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen2.5-3B
data_dir: /lus/flare/projects/ModCon/ngetty/hackathon_rl/prepared_data

tokenizer:
  _component_: torchtune.models.qwen2_5.qwen2_5_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 1024

dataset:
  _component_: torchtune.dev.rl.gene_recall.gene_recall_dataset
  data_files: ${data_dir}/gene_recall_train.jsonl
  max_seq_len: 1024
seed: 42
shuffle: True

model:
  _component_: torchtune.models.qwen2_5.qwen2_5_3b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN2

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN2

resume_from_checkpoint: False
save_every_n_epochs: 1
save_every_n_steps: 50

# Phase 2: dedicated_rank vLLM. Rank 11 runs the vLLM engine + generation
# loop; rank 0 is paired with it via _gen_pg (gloo, 2-rank).
vllm_mode: dedicated_rank
vllm_dedicated_rank: 11
vllm_max_model_len: 2048
vllm_gpu_memory_utilization: 0.7
vllm_weight_sync: true
vllm_weight_sync_interval: 1

always_compute_rollout_logprobs: true

async_generation:
  enabled: false  # Phase 2 Step 1 first validates synchronous gen_pg roundtrip
  max_staleness: 1

reward_mode: gene_recall
gene_reward_metric: f1

batch_size: 2
grpo_samples: 8
forward_batch_size: 4
max_generated_tokens: 512
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

epochs: 5
num_steps: 10  # smoke smoke; bump after Step 1 lands

clip_grad_norm: 1.0

optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 10

loss:
  _component_: torchtune.dev.rl.loss.GRPOLoss
  kl_coeff: 0.1
  epsilon: 0.2

device: xpu

enable_activation_checkpointing: True
compile: False

dtype: bf16

metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
