# GRPO without vLLM on Intel XPU (Aurora HPC) — Gemma 4 26B-A4B (MoE)
# Uses native generation (no vLLM server). All tiles run FSDP training.
#
# Architecture: 30 layers, 128 experts per layer, top-8 routing, ~3.8B active params.
# Additive MoE: dense MLP (intermediate=2112) + MoE block (704/expert) summed per layer.
# Expected ~5-8x faster generation vs 31B baseline (117s/step) due to ~10x less FFN compute.
#
# Memory budget per training tile (24 GiB HBM):
#   FSDP shard (25.2B / 12 ranks): ~4.2 GiB
#   Ref FSDP shard:                ~4.2 GiB
#   Optimizer states (2x shard):   ~8.4 GiB
#   Activations (ac enabled):      ~2-4 GiB
#   Total estimated:               ~19-21 GiB — within 24 GiB with ac on
#
# Launch:
#   bash recipes/dev/run_grpo_xpu.sh 12 5

name: grpo_novllm_gemma4_26b_a4b_xpu

output_dir: /tmp/torchtune/grpo_novllm_gemma4_26b_a4b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/gemma-4-26B-A4B

# No vLLM — uses native generation

# Tokenizer (same tokenizer as 31B)
tokenizer:
  _component_: torchtune.models.gemma4.gemma4_tokenizer
  tokenizer_json_path: ${base_model_path}/tokenizer.json
  tokenizer_config_json_path: ${base_model_path}/tokenizer_config.json
  max_seq_len: 512

# Dataset
dataset:
  _component_: torchtune.dev.grpo.gsm8k.gsm8k_dataset
  partition: 1-9/10
seed: 42
shuffle: False

# Model — 26B-A4B MoE, all defaults hardcoded in builder
model:
  _component_: torchtune.models.gemma4.gemma4_26b_a4b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: GEMMA4

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: GEMMA4

resume_from_checkpoint: False
save_every_n_epochs: 1

# GRPO parameters — same as 31B baseline for initial comparison
batch_size: 1
grpo_samples: 4
forward_batch_size: 4
max_generated_tokens: 128
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

num_steps: 5

clip_grad_norm: 1.0

epochs: 1
optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 2
loss:
  _component_: torchtune.dev.grpo.loss.GRPOSimpleLoss
  kl_coeff: 0.01
  epsilon: 0.2

# XPU device
device: xpu

# Memory management — 24 GiB HBM per tile; activation checkpointing required
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

reward_functions:
    - _component_: torchtune.dev.rl.rewards.FormattedMathCorrectnessReward
      answer_tag: answer
      positive_reward: 10.0
      negative_reward: 0.0
    - _component_: torchtune.dev.rl.rewards.ThinkingAnswerFormattingReward
      think_tag: think
      answer_tag: answer
      positive_reward: 1.0
      negative_reward: 0.0

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
