# GRPO gene recall training — Qwen3-30B-A3B MoE, single node, colocated vLLM
#
# 30.5B total params, ~3.3B active per token (128 experts, top-8 softmax).
# vLLM serves natively via FusedMoE/IPEX kernels (model_type=qwen3_moe).
# 10 training tiles + 2 vLLM tiles (TP=2), SHM weight sync.
#
# Launch (from held compute node):
#   python3 -m torch.distributed.run --standalone --nproc_per_node=10 \
#       recipes/dev/grpo_full_finetune_distributed_xpu.py \
#       --config recipes/configs/dev/production/qwen3_30b_a3b_grpo_xpu.yaml

name: grpo_gene_recall_qwen3_30b_a3b_xpu

output_dir: /lus/flare/projects/ModCon/ngetty/torchtune/outputs/gene_recall_qwen3_30b_a3b
base_model_path: /lus/flare/projects/ModCon/ngetty/models/Qwen3-30B-A3B
data_dir: /lus/flare/projects/ModCon/ngetty/hackathon_rl/prepared_data

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen3_moe.qwen3_moe_tokenizer
  path: ${base_model_path}/vocab.json
  merges_file: ${base_model_path}/merges.txt
  max_seq_len: 512

# Dataset — gene recall JSONL
dataset:
  _component_: torchtune.dev.rl.gene_recall.gene_recall_dataset
  data_files: ${data_dir}/gene_recall_train.jsonl
  max_seq_len: 512
seed: 42
shuffle: True

# Model
model:
  _component_: torchtune.models.qwen3_moe.qwen3_30b_a3b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files:
    filename_format: model-{}-of-{}.safetensors
    max_filename: "00016"
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN3_MOE

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files:
    filename_format: model-{}-of-{}.safetensors
    max_filename: "00016"
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: QWEN3_MOE

resume_from_checkpoint: False
save_every_n_epochs: 1
save_every_n_steps: 20

# Weight sync — SHM only (avoids XCCL IPC handle leak)
vllm_weight_sync_method: shm

# Reward
reward_mode: gene_recall
gene_reward_metric: f1

# GRPO parameters
# 30B MoE has ~3.3B active params → lighter memory than dense 32B.
# Validated production envelope: G=8 / fbs=8 (3/3 clean, 54.8s/step, 9.2 tok/s).
# G=4 OOMs step 1 from allocator fragmentation; G=8's larger initial allocation
# pre-shapes the block pool to match steady-state needs.
# See docs/reports/moe_p0p1_experiments_20260427.md.
batch_size: 1
grpo_samples: 8
forward_batch_size: 8
max_generated_tokens: 512
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

epochs: 5
num_steps: 500

clip_grad_norm: 1.0

optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 10
loss:
  _component_: torchtune.dev.rl.loss.GRPOSimpleLoss
  kl_coeff: 0.3
  epsilon: 0.2

# XPU device
device: xpu

# AC required — reduces peak backward memory for MoE layers
enable_activation_checkpointing: True
compile: False

# Precision
dtype: bf16

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

# Profiler disabled
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
