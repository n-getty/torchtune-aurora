# GRPO with vLLM server mode on Intel XPU (Aurora HPC) — Gemma 4 26B-A4B (MoE)
# Config G=8: grpo_samples=8, forward_batch_size=4 (chunked backward, 2 chunks)
# Target: demonstrate MoE memory efficiency allows 2× grpo_samples vs dense 31B baseline.
#
# Dense 31B uses 25.6 GiB at grpo_samples=4 (>24 GiB HBM, system overflow — can't go higher).
# MoE 26B uses 20.66 GiB at grpo_samples=4. Chunked backward keeps peak memory at grpo_samples=4
# level because only forward_batch_size=4 sequences' activations exist at once.
#
# Step time estimate: gen ~30s (2× gen@4) + GRPO ~10s (2 chunks) = ~40s
# Throughput: 8/40 = 0.20 samples/s vs dense 31B 4/23.5 = 0.17 samples/s (+18%)

name: grpo_server_gemma4_26b_a4b_g8_xpu

output_dir: /tmp/torchtune/grpo_server_gemma4_26b_a4b_g8
base_model_path: /lus/flare/projects/ModCon/ngetty/models/gemma-4-26B-A4B

# vLLM server mode
vllm_url: "http://localhost:8001"
vllm_group_port: 51216
vllm_weight_sync: false

tokenizer:
  _component_: torchtune.models.gemma4.gemma4_tokenizer
  tokenizer_json_path: ${base_model_path}/tokenizer.json
  tokenizer_config_json_path: ${base_model_path}/tokenizer_config.json
  max_seq_len: 512

dataset:
  _component_: torchtune.dev.rl.gsm8k.gsm8k_dataset
  partition: 1-9/10
seed: 42
shuffle: False

model:
  _component_: torchtune.models.gemma4.gemma4_26b_a4b

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: GEMMA4

ref_checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${base_model_path}
  checkpoint_files: [
    model-00001-of-00002.safetensors,
    model-00002-of-00002.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}/ref
  model_type: GEMMA4

resume_from_checkpoint: False
save_every_n_epochs: 100
save_final_checkpoint: false

# G=8: double the generation samples vs 31B baseline
# forward_batch_size=4 keeps backward memory at grpo_samples=4 level (2 chunks)
batch_size: 1
grpo_samples: 8
forward_batch_size: 4
max_generated_tokens: 128
top_k: null
temperature: 1.0

ppo_epochs: 1
gradient_accumulation_steps: 1

num_steps: 5

clip_grad_norm: 1.0

epochs: 1
optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-6
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 2
loss:
  _component_: torchtune.dev.rl.loss.GRPOSimpleLoss
  kl_coeff: 0.01
  epsilon: 0.2

device: xpu
enable_activation_checkpointing: True
compile: False
dtype: bf16

reward_functions:
    - _component_: torchtune.dev.rl.rewards.FormattedMathCorrectnessReward
      answer_tag: answer
      positive_reward: 10.0
      negative_reward: 0.0
    - _component_: torchtune.dev.rl.rewards.ThinkingAnswerFormattingReward
      think_tag: think
      answer_tag: answer
      positive_reward: 1.0
      negative_reward: 0.0

metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True

profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: False
  profile_memory: False
  with_stack: False
  record_shapes: False
  with_flops: False
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
